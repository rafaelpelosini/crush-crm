name: Crush CRM — Daily Sync

on:
  schedule:
    # Roda às 06:00 horário de Brasília (09:00 UTC)
    - cron: "0 9 * * *"
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar sync
        env:
          WOO_URL:      ${{ secrets.WOO_URL }}
          WOO_KEY:      ${{ secrets.WOO_KEY }}
          WOO_SECRET:   ${{ secrets.WOO_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sync.py
